services:
  mysql:
    image: mysql:8.0
    container_name: orbitcrm-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orbit_platform
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - orbit_mysql:/var/lib/mysql
      - ../../database/platform/001_platform_schema.sql:/docker-entrypoint-initdb.d/001_platform_schema.sql:ro

  redis:
    image: redis:7
    container_name: orbitcrm-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: orbitcrm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: orbitcrm-nacos
    environment:
      MODE: standalone
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: orbitcrm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Shanghai
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - orbit_minio:/data

volumes:
  orbit_mysql:
  orbit_minio:
